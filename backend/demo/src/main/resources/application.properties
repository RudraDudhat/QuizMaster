spring.application.name=quizmaster

# ??? PostgreSQL ?????????????????????????????????????????
spring.datasource.url=jdbc:postgresql://localhost:5432/quizmaster
spring.datasource.username=postgres
spring.datasource.password=Rudr@1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ??? JPA / Hibernate ???????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ??? Flyway ????????????????????????????????????????????
spring.flyway.enabled=false

# ??? JWT ???????????????????????????????????????????????
# JWT
app.jwt.secret="p9ODySl2UY3XzSrMXpIxKx5plTYBBpmOkMXjooDcmS5i1N8dwZNcx7QeJUB2qhjn=\"
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=quizmaster

# ??? Google OAuth2 ?????????????????????????????????????
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# ??? Mail (SMTP) ??????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ??? App Config ???????????????????????????????????????
app.base-url=http://localhost:8080
app.frontend-url=http://localhost:3000

# ??? CORS allowed origins (comma-separated) ?????????????
# Override per-environment, e.g. APP_CORS_ALLOWED_ORIGINS=https://quizmaster.app,https://staging.quizmaster.app
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ??? Actuator ???????????????????????????????????????????
# Only expose health + info publicly. Keep everything else off the wire.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.version=0.0.1-SNAPSHOT

# ??? Rate limiting (auth endpoints) ?????????????????????
# Per-IP attempts allowed in the rolling window for login/refresh/password-reset
app.ratelimit.auth.max-attempts=10
app.ratelimit.auth.window-seconds=60
